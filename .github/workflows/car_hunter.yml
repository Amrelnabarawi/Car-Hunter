name: 🚗 Car Hunter — Hourly Search

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Run Car Hunter
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          OUTLOOK_USER:       ${{ secrets.OUTLOOK_USER }}
          OUTLOOK_PASSWORD:   ${{ secrets.OUTLOOK_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python car_hunter.py

      - name: 💾 Save state
        if: always()
        run: |
          git config --global user.name "Car Hunter Bot"
          git config --global user.email "bot@car-hunter.local"
          git add -f seen_cars.json daily_stats.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🚗 Update state [$(date +'%Y-%m-%d %H:%M')]"
          git push 2>/dev/null || true
